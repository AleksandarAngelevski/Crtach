<div class="login-container">
<form [formGroup]="fg" class="login-form-wrapper" (ngSubmit)="login()">

  <section>
    <label>Username</label>
    <input formControlName="username" placeholder="Username" />
    @if (usernameError) {
        <p class="error">{{ usernameError }}</p>
    }
  </section>

  <section>
    <label>Password</label>
    <app-password-input [control]="password" [className]="'password-wrapper'" placeholder="Password"></app-password-input>

    @if (passwordError) {
        <p class="error">{{ passwordError }}</p>
    }
  </section>

  <section>
    <button type="button" (click)="login()" class="login-btn">
      Login
    </button>
  </section>
</form>
  @if (error) {
    <p class="error">{{ error }}</p>
  }

</div>
